# Foundry configuration for the Karibu contracts.
# forge-std is vendored into lib/ by scripts/get-foundry-deps.sh (git-free).
[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = ["forge-std/=lib/forge-std/src/"]

[fmt]
line_length = 100
tab_width = 4
